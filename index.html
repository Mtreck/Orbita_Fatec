<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Órbita Fatec · Hub</title>
  <link rel="stylesheet" href="/hub.css">
</head>
<body>

  <!-- Background Effects -->
  <div class="particles"></div>

  <!-- AUTH GUARD (Proteção de carregamento) -->
  <div id="auth-guard" style="position:fixed; inset:0; background:var(--bg); z-index:2000; display:flex; align-items:center; justify-content:center;">
    <div class="orbit-container" style="width:60px; height:60px;">
      <div class="orbit-center" style="width:12px; height:12px;"></div>
      <div class="orbit-planet" style="width:8px; height:8px; transform-origin:4px 33px;"></div>
    </div>
  </div>

  <!-- MAIN HUB -->
  <div id="app" class="hidden">
    <header class="hub-header">
      <div class="hub-header-inner">
        <div class="header-left-group">
          <div class="hub-brand">
            <div class="orbit-container">
              <div class="orbit-center">F</div>
              <div class="orbit-planet"></div>
            </div>
            <span class="hub-logo">
              <span class="logo-orbita">ÓRBITA</span>
              <span class="logo-fatec">FATEC</span>
            </span>
          </div>
        </div>

        <div class="hub-user-area">
          <span class="role-badge" id="role-badge">ADMINISTRADOR</span>
          <div class="hub-user-info">
            <div class="user-avatar" id="user-avatar">A</div>
            <span class="user-name" id="user-display-name">admti</span>
          </div>
          <button id="logout-btn" class="logout-btn" title="Sair">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </header>

    <main class="hub-main">
      <h1 style="font-size:3.5rem; font-weight:900; margin-bottom:1rem; letter-spacing:-2px;">O que você precisa hoje?</h1>
      <p id="hero-greeting" style="color:rgba(255,255,255,0.5); font-size:1.2rem; margin-bottom:4rem;">Selecione um módulo para gerenciar os serviços.</p>

      <div class="hub-grid">
        <a href="emprestimo" class="module-card">
          <div style="background:rgba(124, 58, 237, 0.1); padding:1.2rem; border-radius:18px; color:var(--purple); border:1px solid var(--border);">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          </div>
          <div>
            <h3 style="font-size:1.4rem; margin-bottom:0.4rem">Empréstimo</h3>
            <p style="font-size:0.9rem; color:rgba(255,255,255,0.5)">Controle de notebooks e periféricos.</p>
          </div>
        </a>

        <a href="usuarios" class="module-card" id="mod-usuarios">
          <div style="background:rgba(235, 112, 37, 0.1); padding:1.2rem; border-radius:18px; color:var(--orange); border:1px solid rgba(235,112,37,0.2);">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <div>
            <h3 style="font-size:1.4rem; margin-bottom:0.4rem">Usuários</h3>
            <p style="font-size:0.9rem; color:rgba(255,255,255,0.5)">Gerenciamento de contas e equipe.</p>
          </div>
        </a>

        <a href="ensalamento" class="module-card" id="mod-ensalamento">
          <div style="background:rgba(34, 197, 94, 0.1); padding:1.2rem; border-radius:18px; color:#22c55e; border:1px solid rgba(34, 197, 94, 0.2);">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </div>
          <div>
            <h3 style="font-size:1.4rem; margin-bottom:0.4rem">Ensalamento</h3>
            <p style="font-size:0.9rem; color:rgba(255,255,255,0.5)">Gestão de salas e simulação de horários.</p>
          </div>
        </a>
      </div>
    </main>
  </div>

  <script type="module" src="/hub.js"></script>
</body>
</html>
